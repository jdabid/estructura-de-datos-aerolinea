replicaCount: 2

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

image:
  repository: ghcr.io/jdabid/flight-reservation-system/flight-app
  tag: latest

service:
  type: ClusterIP
  port: 8000

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  scaleUp:
    stabilizationWindowSeconds: 60
    maxPods: 2
  scaleDown:
    stabilizationWindowSeconds: 300
    maxPods: 1

env:
  DATABASE_URL: postgresql://user:pass@db:5432/flights
  RABBITMQ_URL: pyamqp://admin:admin123@rabbitmq:5672//
  REDIS_HOST: redis
  REDIS_PORT: "6379"

secrets:
  GROQ_API_KEY: ""

worker:
  enabled: true
  command: "celery -A src.worker.celery_app worker --loglevel=info"

healthcheck:
  path: /

prometheus:
  scrape: true
  port: 8000

ingress:
  enabled: false
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: flights.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: flights-tls
      hosts:
        - flights.example.com