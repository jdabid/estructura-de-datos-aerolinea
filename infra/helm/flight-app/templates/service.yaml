apiVersion: v1
kind: Service
metadata:
  name: {{ include "flight-app.fullname" . }}-api
  labels:
    {{- include "flight-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.port }}
    protocol: TCP
    name: http
  selector:
    {{- include "flight-app.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
