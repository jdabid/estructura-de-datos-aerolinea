apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flight-app-ingress
  labels:
    app.kubernetes.io/name: flight-app
    app.kubernetes.io/component: api
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - flights.example.com
      secretName: flight-app-tls
  rules:
    - host: flights.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prod-flight-app-api
                port:
                  number: 8000
