global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'flight-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8000']
        labels:
          service: 'api'

  - job_name: 'flower'
    static_configs:
      - targets: ['flower:5555']
        labels:
          service: 'flower'
